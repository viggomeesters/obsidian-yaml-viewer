<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">YAML Viewer for Obsidian</title>
  <desc id="desc">A read-only YAML tree viewer for Obsidian with search, outline navigation, comments, and syntax-highlighted source.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#20221f"/>
      <stop offset="1" stop-color="#141715"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="720" fill="url(#bg)"/>
  <rect x="72" y="72" width="1456" height="576" rx="30" fill="#242720" stroke="#3f4639" filter="url(#shadow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="128" y="166" fill="#f2ecd2" font-size="58" font-weight="800">YAML Viewer</text>
    <text x="128" y="218" fill="#b7b099" font-size="26">Read-only YAML browsing for Obsidian</text>
    <text x="128" y="276" fill="#8f8b76" font-size="22">Tree view, search, comments, outline navigation, and syntax-highlighted source for .yaml and .yml files.</text>

    <rect x="128" y="324" width="152" height="42" rx="10" fill="#344235" stroke="#506a4e"/>
    <text x="153" y="352" fill="#8bf39c" font-size="18" font-weight="700">Read-only</text>
    <rect x="298" y="324" width="178" height="42" rx="10" fill="#2c3740" stroke="#49606f"/>
    <text x="323" y="352" fill="#8fd2ff" font-size="18" font-weight="700">Outline map</text>
    <rect x="494" y="324" width="154" height="42" rx="10" fill="#3b2f3a" stroke="#684d67"/>
    <text x="519" y="352" fill="#ff93d0" font-size="18" font-weight="700">Search</text>
  </g>

  <g transform="translate(874 128)">
    <rect width="520" height="464" rx="18" fill="#1b1e1a" stroke="#41483c"/>
    <rect x="0" y="0" width="520" height="62" rx="18" fill="#252923"/>
    <rect x="0" y="44" width="520" height="18" fill="#252923"/>
    <text x="28" y="39" fill="#f2ecd2" font-family="Inter, ui-sans-serif, system-ui" font-size="23" font-weight="750">life-os-schema.yaml</text>
    <rect x="324" y="16" width="150" height="30" rx="8" fill="#181b17" stroke="#41483c"/>
    <text x="356" y="37" fill="#8f8b76" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Filter</text>

    <g font-family="Menlo, Consolas, ui-monospace, monospace" font-size="18">
      <line x1="48" y1="104" x2="48" y2="410" stroke="#3c4438"/>
      <line x1="78" y1="178" x2="78" y2="332" stroke="#3c4438"/>
      <text x="48" y="102" fill="#ff4f9a">root</text>
      <rect x="104" y="84" width="46" height="24" rx="5" fill="#283a2d"/>
      <text x="114" y="102" fill="#39d98a" font-size="14">map</text>
      <text x="160" y="102" fill="#aaa38a" font-size="15">12 keys</text>

      <text x="72" y="146" fill="#7f7a66"># Life OS Schema - Machine-readable datamodel</text>
      <text x="72" y="176" fill="#ff4f9a">version</text>
      <rect x="156" y="158" width="68" height="24" rx="5" fill="#283a2d"/>
      <text x="166" y="176" fill="#39d98a" font-size="14">string</text>
      <text x="238" y="176" fill="#e6d85c">9.4.0</text>

      <text x="72" y="220" fill="#ff4f9a">enums</text>
      <rect x="136" y="202" width="46" height="24" rx="5" fill="#283a2d"/>
      <text x="146" y="220" fill="#39d98a" font-size="14">map</text>
      <text x="196" y="220" fill="#aaa38a" font-size="15">5 keys</text>

      <text x="102" y="264" fill="#ff4f9a">area</text>
      <rect x="156" y="246" width="40" height="24" rx="5" fill="#263948"/>
      <text x="166" y="264" fill="#64b5f6" font-size="14">seq</text>
      <text x="210" y="264" fill="#aaa38a" font-size="15">4 items</text>

      <text x="132" y="308" fill="#ff4f9a">[0]</text>
      <rect x="176" y="290" width="68" height="24" rx="5" fill="#283a2d"/>
      <text x="186" y="308" fill="#39d98a" font-size="14">string</text>
      <text x="258" y="308" fill="#e6d85c">work</text>

      <text x="102" y="368" fill="#ff4f9a">status</text>
      <rect x="178" y="350" width="40" height="24" rx="5" fill="#263948"/>
      <text x="188" y="368" fill="#64b5f6" font-size="14">seq</text>
      <text x="232" y="368" fill="#aaa38a" font-size="15">6 items</text>
    </g>

    <line x1="382" y1="86" x2="382" y2="428" stroke="#41483c"/>
    <text x="404" y="108" fill="#aaa38a" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="800">OUTLINE</text>
    <g font-family="Menlo, Consolas, ui-monospace, monospace" font-size="15">
      <rect x="404" y="128" width="88" height="26" rx="5" fill="#363a34"/>
      <text x="414" y="146" fill="#f2ecd2">root</text>
      <text x="470" y="146" fill="#aaa38a">12</text>
      <rect x="404" y="162" width="88" height="26" rx="5" fill="#30342f"/>
      <text x="424" y="180" fill="#f2ecd2">enums</text>
      <text x="476" y="180" fill="#aaa38a">5</text>
      <rect x="404" y="196" width="88" height="26" rx="5" fill="#30342f"/>
      <text x="438" y="214" fill="#aaa38a">area</text>
      <text x="476" y="214" fill="#aaa38a">4</text>
      <rect x="404" y="230" width="88" height="26" rx="5" fill="#30342f"/>
      <text x="424" y="248" fill="#f2ecd2">status</text>
      <text x="476" y="248" fill="#aaa38a">6</text>
    </g>
  </g>
</svg>
